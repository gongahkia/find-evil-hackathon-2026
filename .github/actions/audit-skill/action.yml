name: Audit KelpClaw Skill
description: Analyze, policy-check, run, and export an audit bundle for a SKILL.md.

inputs:
  skill:
    description: Path to the SKILL.md to audit.
    required: false
    default: ./SKILL.md
  policy:
    description: Built-in KelpClaw policy pack to apply.
    required: false
    default: baseline
  input:
    description: Optional JSON input file for the audit-first skill run.
    required: false
    default: ""
  fail-on-unrunnable:
    description: Fail the action when the compatibility report marks the skill as not runnable.
    required: false
    default: "true"
  upload-artifact:
    description: Upload the exported audit bundle as a workflow artifact.
    required: false
    default: "true"
  upload-sarif:
    description: Upload KelpClaw SARIF findings to GitHub code scanning.
    required: false
    default: "true"
  governance:
    description: Include an SG/APAC governance report in the audit bundle.
    required: false
    default: "false"
  region:
    description: Governance report region.
    required: false
    default: sg
  framework:
    description: Governance report framework.
    required: false
    default: agentic-ai

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "20"
    - uses: pnpm/action-setup@v4
      with:
        version: 10.33.0
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
    - name: Build KelpClaw CLI
      shell: bash
      run: pnpm --filter @kelpclaw/cli build
    - name: Audit skill
      id: audit
      shell: bash
      run: |
        mkdir -p .kelpclaw
        INPUT_PATH="${{ inputs.input }}"
        if [ -z "$INPUT_PATH" ]; then
          INPUT_PATH=".kelpclaw/action-input.json"
          printf '{}\n' > "$INPUT_PATH"
        fi

        node packages/cli/dist/index.js compat "${{ inputs.skill }}" --policy "${{ inputs.policy }}" > .kelpclaw/compatibility.json
        node packages/cli/dist/index.js export-sarif "${{ inputs.skill }}" --policy "${{ inputs.policy }}" --out .kelpclaw/findings.sarif > .kelpclaw/sarif-output.json
        echo "sarif-path=.kelpclaw/findings.sarif" >> "$GITHUB_OUTPUT"
        cat .kelpclaw/compatibility.json
        node <<'NODE'
        const fs = require("node:fs");
        const report = JSON.parse(fs.readFileSync(".kelpclaw/compatibility.json", "utf8"));
        const failOnUnrunnable = "${{ inputs.fail-on-unrunnable }}" === "true";
        for (const finding of report.policyFindings || []) {
          const level = finding.action === "deny" ? "error" : "warning";
          const title = encodeURIComponent(`KelpClaw ${finding.action}: ${finding.tool}`);
          const message = encodeURIComponent(`${finding.reason}; rules=${(finding.matchedRuleIds || []).join(",")}`);
          console.log(`::${level} title=${title}::${message}`);
        }
        if (!report.runnable && failOnUnrunnable) {
          console.log("::error title=KelpClaw compatibility::Skill is not runnable under the selected policy.");
          process.exit(1);
        }
        NODE
        set +e
        RUN_OUTPUT="$(node packages/cli/dist/index.js run-skill "${{ inputs.skill }}" --input "$INPUT_PATH" --policy "${{ inputs.policy }}" 2> .kelpclaw/run-error.log)"
        RUN_EXIT=$?
        set -e
        if [ -s .kelpclaw/run-error.log ]; then
          cat .kelpclaw/run-error.log
        fi
        if [ "$RUN_EXIT" -ne 0 ]; then
          if node -e 'const fs = require("node:fs"); const report = JSON.parse(fs.readFileSync(".kelpclaw/compatibility.json", "utf8")); const failOnUnrunnable = "${{ inputs.fail-on-unrunnable }}" === "true"; process.exit(report.runnable || failOnUnrunnable ? 0 : 1);'; then
            exit "$RUN_EXIT"
          fi
        fi
        printf '%s\n' "$RUN_OUTPUT"
        printf '%s\n' "$RUN_OUTPUT" > .kelpclaw/run-output.json
        RUN_ID="$(printf '%s\n' "$RUN_OUTPUT" | node -e 'let input=""; process.stdin.on("data", c => input += c); process.stdin.on("end", () => console.log(JSON.parse(input).runId));')"
        EXPORT_ARGS=(export-audit-bundle "$RUN_ID" --out ".kelpclaw/audit-bundle-$RUN_ID" --include-sarif --include-controls)
        if [ "${{ inputs.governance }}" = "true" ]; then
          EXPORT_ARGS+=(--include-governance --region "${{ inputs.region }}" --framework "${{ inputs.framework }}")
        fi
        node packages/cli/dist/index.js "${EXPORT_ARGS[@]}" > .kelpclaw/bundle-output.json
        cp ".kelpclaw/audit-bundle-$RUN_ID/findings.sarif" .kelpclaw/findings.sarif
        node packages/cli/dist/index.js verify-audit-bundle ".kelpclaw/audit-bundle-$RUN_ID" --strict > .kelpclaw/bundle-verify.json
        echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
        echo "bundle-path=.kelpclaw/audit-bundle-$RUN_ID" >> "$GITHUB_OUTPUT"
        node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
        const fs = require("node:fs");
        const compat = JSON.parse(fs.readFileSync(".kelpclaw/compatibility.json", "utf8"));
        const run = JSON.parse(fs.readFileSync(".kelpclaw/run-output.json", "utf8"));
        const bundle = JSON.parse(fs.readFileSync(".kelpclaw/bundle-output.json", "utf8"));
        const verify = JSON.parse(fs.readFileSync(".kelpclaw/bundle-verify.json", "utf8"));
        const governancePath = `${bundle.bundleDir}/governance-report.json`;
        const controlsPath = `${bundle.bundleDir}/controls.md`;
        const sarifPath = `${bundle.bundleDir}/findings.sarif`;
        const governance = fs.existsSync(governancePath) ? JSON.parse(fs.readFileSync(governancePath, "utf8")) : undefined;
        const sarif = fs.existsSync(sarifPath) ? JSON.parse(fs.readFileSync(sarifPath, "utf8")) : undefined;
        const results = sarif?.runs?.[0]?.results || [];
        for (const result of results) {
          const level = result.level === "error" ? "error" : result.level === "warning" ? "warning" : "notice";
          const title = encodeURIComponent(result.properties?.title || result.ruleId || "KelpClaw finding");
          const message = encodeURIComponent(result.message?.text || "KelpClaw finding");
          console.error(`::${level} title=${title}::${message}`);
        }
        console.log("## KelpClaw Skill Audit");
        console.log("");
        console.log(`- Skill: \`${"${{ inputs.skill }}"}\``);
        console.log(`- Policy: \`${"${{ inputs.policy }}"}\``);
        console.log(`- Runnable: \`${compat.runnable}\``);
        console.log(`- Run ID: \`${run.runId}\``);
        console.log(`- Status: \`${run.status}\``);
        console.log(`- Bundle: \`${bundle.bundleDir}\``);
        console.log(`- Bundle signature: \`${verify.signature.valid ? "valid" : "invalid"}\``);
        console.log(`- Bundle attestation: \`${verify.attestation?.valid ? "valid" : "invalid"}\``);
        console.log(`- SARIF findings: \`${results.length}\``);
        console.log(`- Controls matrix: \`${fs.existsSync(controlsPath) ? controlsPath : "not generated"}\``);
        if (governance) {
          console.log(`- Governance tier: \`${governance.autonomyTier}\``);
          console.log(`- Governance findings: \`${(governance.findings || []).length}\``);
          console.log("");
          console.log("| Control Area | Status | Evidence |");
          console.log("| --- | --- | --- |");
          for (const mapping of governance.frameworkMapping || []) {
            console.log(`| ${mapping.controlArea} | ${mapping.status} | ${(mapping.evidence || []).join("<br>")} |`);
          }
        }
        console.log(`- Tools: \`${(compat.toolsDetected || []).join(", ") || "none"}\``);
        console.log(`- Network: \`${compat.network}\``);
        console.log(`- Sandbox: \`${compat.sandboxProfile}\``);
        if ((compat.policyFindings || []).length > 0) {
          console.log("");
          console.log("| Action | Tool | Rules | Reason |");
          console.log("| --- | --- | --- | --- |");
          for (const finding of compat.policyFindings) {
            console.log(`| ${finding.action} | ${finding.tool} | ${(finding.matchedRuleIds || []).join(", ")} | ${finding.reason} |`);
          }
        }
        NODE
    - name: Upload SARIF
      if: ${{ always() && inputs.upload-sarif == 'true' && steps.audit.outputs.sarif-path != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.audit.outputs.sarif-path }}
    - name: Upload audit bundle
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: kelpclaw-audit-${{ steps.audit.outputs.run-id }}
        path: ${{ steps.audit.outputs.bundle-path }}
