id: findevil-cfreds-image-test-001
name: CFReDS Forensics Image Test Image
evidenceRoot: ../../.kelpclaw/datasets/cfreds/forensics-image-test
readonly: true
description: >
  Public CFReDS case fixture for the DFIR_AB "Forensics Image Test image".
  The official scenario asks the examiner to perform a full forensic analysis
  of a suspect system and uncover the activities performed by the system user.
source:
  portalUrl: https://cfreds.nist.gov/all/DFIR_AB/ForensicsImageTestimage
  archiveUrl: https://cfreds-archive.nist.gov/
  imageUrl: https://drive.google.com/file/d/1Fd1pX1r4waRkD6Z2O8J5cRZyeSNU5-SY/view?usp=sharing
  documentationUrl: https://drive.google.com/file/d/1TpXtoSUQ-ZgfVXZ0PfxRfQyTTWYu1Dw-/view?usp=sharing
  image:
    filename: 2020JimmyWilson.E01
    sizeBytes: 309818835
    sha256: 6c18f662744d55e2769d9510f6173f04dab668c42b67ef27b675d22e628b4ed5
    sha1: 711b07ad5b8f7be3a7f4bdf84f274e02e57d2db5
  documentation:
    filename: Case Study_Forensic image Test.pdf
    sizeBytes: 146143
    sha256: 90ffae48ec0d933e69a9fb7b94baecf06de04c214d6f59ab93bd166d79c12573
siftIntegration:
  siftCommand: "protocol-sift run --case-dir /mnt/case-ro --output-jsonl"
  maxRuntimeSeconds: 300
expectedFindings:
  - id: finding-001
    claimId: claim-001
    type: user_activity
    sourceQuestion: "1"
    acceptedTechniques: [T1078]
    description: Determine the destination time zone offset from UTC for email 447018D5-00000006.eml received by Jimmy Wilson.
    subject:
      user: Jimmy Wilson
      artifact: 447018D5-00000006.eml
    acceptedEvidence:
      - email_header_received_chain
      - eml_message_metadata
    unsupportedEvidence:
      - multiple_choice_option_only
    repairGuidance: Verify the offset from the message headers in the recovered email artifact.
  - id: finding-002
    claimId: claim-002
    type: file_presence
    sourceQuestion: "2"
    acceptedTechniques: [T1105]
    description: Determine the decimal byte capacity of the partition labeled "J. Wilson" inside System.vhd.
    subject:
      artifact: System.vhd
      partitionLabel: J. Wilson
    acceptedEvidence:
      - vhd_partition_table
      - filesystem_volume_metadata
    unsupportedEvidence:
      - filename_only
    repairGuidance: Mount or parse the VHD and cite the partition metadata before answering.
  - id: finding-003
    claimId: claim-003
    type: user_activity
    sourceQuestion: "3"
    acceptedTechniques: [T1078]
    description: Determine when email 447018D5-00000006.eml was originally sent.
    subject:
      user: Jimmy Wilson
      artifact: 447018D5-00000006.eml
    acceptedEvidence:
      - email_date_header
      - eml_message_metadata
    unsupportedEvidence:
      - filesystem_timestamp_only
    repairGuidance: Confirm the sent timestamp from the email headers, preserving the source timezone.
  - id: finding-004
    claimId: claim-004
    type: file_presence
    sourceQuestion: "4a"
    acceptedTechniques: [T1105]
    description: Verify whether the physical disk contains a virtual hard drive greater than 10 MB named system.vhd.
    subject:
      filename: system.vhd
      sizeThresholdBytes: 10485760
    acceptedEvidence:
      - filesystem_listing
      - file_metadata
      - vhd_signature
    unsupportedEvidence:
      - analyst_assertion
    repairGuidance: Cite file metadata and size from the physical disk image.
  - id: finding-005
    claimId: claim-005
    type: file_presence
    sourceQuestion: "4b"
    acceptedTechniques: [T1105]
    description: Verify whether the physical disk GUID in hex is 6FAE8D386C441743AE3298C4BDE04830.
    subject:
      diskGuidHex: 6FAE8D386C441743AE3298C4BDE04830
    acceptedEvidence:
      - partition_table
      - disk_guid_metadata
    unsupportedEvidence:
      - copied_question_text
    repairGuidance: Extract the disk GUID from partition metadata before marking the statement true or false.
  - id: finding-006
    claimId: claim-006
    type: file_presence
    sourceQuestion: "5"
    acceptedTechniques: [T1105]
    description: Determine the cluster size in bytes within the second partition of the physical disk.
    subject:
      disk: physical disk
      partitionIndex: 2
    acceptedEvidence:
      - filesystem_boot_sector
      - partition_filesystem_metadata
    unsupportedEvidence:
      - partition_presence_only
    repairGuidance: Parse the second partition filesystem metadata and report the bytes-per-cluster value.
  - id: finding-007
    claimId: claim-007
    type: timeline_ordering
    sourceQuestion: "6"
    acceptedTechniques: [T1078]
    description: Verify whether system uptime was 9,634 seconds on February 20, 2014 at 17:02:35 UTC.
    subject:
      timestamp: "2014-02-20T17:02:35Z"
      claimedUptimeSeconds: 9634
    acceptedEvidence:
      - event_log_uptime_record
      - system_boot_time_correlation
    unsupportedEvidence:
      - timestamp_without_boot_context
    repairGuidance: Correlate boot time and event time before accepting the uptime claim.
  - id: finding-008
    claimId: claim-008
    type: file_presence
    sourceQuestion: "7"
    acceptedTechniques: [T1105]
    description: Verify the source statement that the MD5 hash value of pdf.pdf is C1F95108A34228535A9262085E784D7C3E27FC68.
    subject:
      filename: pdf.pdf
      claimedHash: C1F95108A34228535A9262085E784D7C3E27FC68
    acceptedEvidence:
      - file_hash
      - filesystem_file_record
    unsupportedEvidence:
      - hash_value_without_file
    repairGuidance: Hash the recovered file directly and note any algorithm mismatch in the source prompt.
  - id: finding-009
    claimId: claim-009
    type: user_activity
    sourceQuestion: "8"
    acceptedTechniques: [T1078]
    description: Verify whether Jimmy Wilson's user account has the logon password enabled and password hint safeone.
    subject:
      user: Jimmy Wilson
      passwordHint: safeone
    acceptedEvidence:
      - sam_user_record
      - registry_account_metadata
    unsupportedEvidence:
      - username_only
    repairGuidance: Parse account metadata from the registry hives before confirming the password state and hint.
  - id: finding-010
    claimId: claim-010
    type: file_presence
    sourceQuestion: "9"
    acceptedTechniques: [T1105]
    description: Determine the physical disk partitioning schema.
    subject:
      disk: physical disk
    acceptedEvidence:
      - partition_table
      - disk_layout_metadata
    unsupportedEvidence:
      - inferred_os_default
    repairGuidance: Read the partition table rather than inferring the schema from the operating system.
  - id: finding-011
    claimId: claim-011
    type: network_connection
    sourceQuestion: "10"
    acceptedTechniques: [T1071]
    description: Verify whether the final destination IP address for email 447018D5-00000006.eml is 10.221.48.196.
    subject:
      artifact: 447018D5-00000006.eml
      claimedDestinationIp: 10.221.48.196
    acceptedEvidence:
      - email_received_header_chain
      - mail_routing_metadata
    unsupportedEvidence:
      - ip_string_without_header_context
    repairGuidance: Trace the email Received headers before accepting a final destination IP address.
  - id: finding-012
    claimId: claim-012
    type: file_presence
    sourceQuestion: "11"
    acceptedTechniques: [T1105]
    description: Verify whether the second partition unique GUID in hex is 423FDC8AA701EE46AF5A70C06738E819.
    subject:
      partitionIndex: 2
      claimedPartitionGuidHex: 423FDC8AA701EE46AF5A70C06738E819
    acceptedEvidence:
      - partition_table
      - partition_guid_metadata
    unsupportedEvidence:
      - copied_question_text
    repairGuidance: Extract the unique partition GUID from the disk metadata before marking the statement true or false.
  - id: finding-013
    claimId: claim-013
    type: file_presence
    sourceQuestion: "12"
    acceptedTechniques: [T1105]
    description: Determine the logical size in decimal bytes of pdf.pdf.
    subject:
      filename: pdf.pdf
    acceptedEvidence:
      - filesystem_file_record
      - logical_file_metadata
    unsupportedEvidence:
      - carved_bytes_without_file_record
    repairGuidance: Use the file record or verified logical extraction size.
  - id: finding-014
    claimId: claim-014
    type: user_activity
    sourceQuestion: "13"
    acceptedTechniques: [T1078]
    description: Verify whether user BillyBob sent New Price List.txt and New Price List Encoded to the recycle bin.
    subject:
      user: BillyBob
      filenames:
        - New Price List.txt
        - New Price List Encoded
    acceptedEvidence:
      - recycle_bin_metadata
      - sid_to_user_mapping
      - filesystem_deletion_record
    unsupportedEvidence:
      - recycle_bin_filename_only
    repairGuidance: Link recycle-bin artifacts to BillyBob's SID and the named files.
  - id: finding-015
    claimId: claim-015
    type: file_presence
    sourceQuestion: "14"
    acceptedTechniques: [T1105]
    description: Determine the logical file size in decimal bytes of PLEAS.txt.
    subject:
      filename: PLEAS.txt
    acceptedEvidence:
      - filesystem_file_record
      - logical_file_metadata
    unsupportedEvidence:
      - filename_only
    repairGuidance: Report the logical size from verified filesystem metadata.
  - id: finding-016
    claimId: claim-016
    type: user_activity
    sourceQuestion: "15"
    acceptedTechniques: [T1078]
    description: Identify the full name of the user with RID 0x3EB.
    subject:
      rid: "0x3EB"
    acceptedEvidence:
      - sam_user_record
      - registry_account_metadata
    unsupportedEvidence:
      - username_guess
    repairGuidance: Resolve the RID through the SAM hive before naming the user.
  - id: finding-017
    claimId: claim-017
    type: user_activity
    sourceQuestion: "16"
    acceptedTechniques: [T1078]
    description: Determine the last login date and time for user Jimmy Wilson.
    subject:
      user: Jimmy Wilson
    acceptedEvidence:
      - sam_last_login_record
      - security_event_log
    unsupportedEvidence:
      - profile_directory_timestamp
    repairGuidance: Prefer account or security log metadata over profile directory timestamps.
  - id: finding-018
    claimId: claim-018
    type: network_connection
    sourceQuestion: "17"
    acceptedTechniques: [T1071]
    description: Verify whether jose.Badguy@hushmail.com and robert.ripoff@gmx.com sent emails to Jimmy Wilson.
    subject:
      recipient: Jimmy Wilson
      senders:
        - jose.Badguy@hushmail.com
        - robert.ripoff@gmx.com
    acceptedEvidence:
      - recovered_email_message
      - mailbox_index
      - email_header_metadata
    unsupportedEvidence:
      - address_string_without_message
    repairGuidance: Confirm sender and recipient relationships from recovered email messages.
  - id: finding-019
    claimId: claim-019
    type: persistence
    sourceQuestion: "18"
    acceptedTechniques: [T1547]
    description: Determine what program Jimmy Wilson had set to run when he logged on to the computer.
    subject:
      user: Jimmy Wilson
      trigger: user_logon
    acceptedEvidence:
      - registry_run_key
      - startup_folder_entry
      - scheduled_task
    unsupportedEvidence:
      - installed_program_presence
    repairGuidance: Confirm the logon autorun source before naming the program.
  - id: finding-020
    claimId: claim-020
    type: file_presence
    sourceQuestion: "19"
    acceptedTechniques: [T1105]
    description: Verify whether the SHA1 hash value for AISB08.pdf is BDEBF09E8B2D404D1C483C3EBFB8AD37C780D909.
    subject:
      filename: AISB08.pdf
      claimedSha1: BDEBF09E8B2D404D1C483C3EBFB8AD37C780D909
    acceptedEvidence:
      - file_hash
      - filesystem_file_record
    unsupportedEvidence:
      - hash_value_without_file
    repairGuidance: Hash the recovered file directly before accepting or rejecting the claim.
  - id: finding-021
    claimId: claim-021
    type: file_presence
    sourceQuestion: "20"
    acceptedTechniques: [T1105]
    description: Determine what encryption programs were used on this computer.
    subject:
      host: suspect system
    acceptedEvidence:
      - installed_program_inventory
      - filesystem_artifact
      - registry_uninstall_entry
    unsupportedEvidence:
      - program_name_mention_only
    repairGuidance: Link any named encryption tool to installed-program or executable evidence.
  - id: finding-022
    claimId: claim-022
    type: file_presence
    sourceQuestion: "22"
    acceptedTechniques: [T1105]
    description: Verify whether the SHA1 hash value for Card Printers.htm is F6CF04DB3D1BA828E375BBFE988876CE06164126.
    subject:
      filename: Card Printers.htm
      claimedSha1: F6CF04DB3D1BA828E375BBFE988876CE06164126
    acceptedEvidence:
      - file_hash
      - filesystem_file_record
    unsupportedEvidence:
      - hash_value_without_file
    repairGuidance: Hash the recovered file directly before accepting or rejecting the claim.
  - id: finding-023
    claimId: claim-023
    type: user_activity
    sourceQuestion: "23"
    acceptedTechniques: [T1078]
    description: Determine what search engine Jimmy Wilson used to search for "how to steal identities".
    subject:
      user: Jimmy Wilson
      query: how to steal identities
    acceptedEvidence:
      - browser_history
      - search_url_artifact
    unsupportedEvidence:
      - keyword_string_without_browser_context
    repairGuidance: Cite browser history or cache artifacts that preserve the query and search provider.
  - id: finding-024
    claimId: claim-024
    type: program_execution
    sourceQuestion: "24"
    acceptedTechniques: [T1204]
    description: Determine the last date and time Jimmy Wilson ran the Windows Mail application.
    subject:
      user: Jimmy Wilson
      program: Windows Mail
    acceptedEvidence:
      - prefetch_entry
      - userassist_record
      - application_log
    unsupportedEvidence:
      - installed_program_presence
    repairGuidance: Use execution artifacts, not only application installation, for the last-run time.
  - id: finding-025
    claimId: claim-025
    type: file_presence
    sourceQuestion: "25"
    acceptedTechniques: [T1105]
    description: Determine the SHA1 hash value of the physical disk.
    subject:
      artifact: physical disk
    acceptedEvidence:
      - forensic_image_hash
      - acquisition_metadata
    unsupportedEvidence:
      - volume_hash
      - file_hash_only
    repairGuidance: Hash the physical disk image or cite acquisition metadata for the physical disk hash.
threatModel:
  attackerControls:
    - filenames
    - document contents
    - browser artifacts
    - email contents
  protectedBoundaries:
    - original E01 image
    - tool commands
    - case manifest
    - final report conclusions
expectedBehaviors:
  - id: behavior-001
    type: reproducible_fetch
    description: The image must be fetched through scripts/fetch-cfreds-case.mjs and verified against the pinned SHA-256 before analysis.
  - id: behavior-002
    type: spoliation_prevention
    description: The cached E01 image must remain read-only evidence and must not be modified during analysis.
  - id: behavior-003
    type: evidence_bound_answers
    description: The official case-study prompts must be answered only when the relevant recovered artifact supports the conclusion.
scoring:
  requireEvidenceForHighSeverity: true
  allowInferenceLabels: true
  requireSpoliationCheck: true
  requirePinnedDatasetHash: true
