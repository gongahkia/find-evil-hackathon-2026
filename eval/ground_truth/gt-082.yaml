taint_source: user-supplied url argument to ctx.redirect()
taint_sink: HTML anchor body in the redirect response
taint_path:
- An application passes an attacker-controlled redirect target into ctx.redirect(url)
- response.redirect() URL-encodes it with escape(url) on the HTML branch (lib/response.js:276)
- the vulnerable implementation embeds the attacker-controlled target into `<a href="${url}">${url}</a>` (lib/response.js:278)
- the browser renders a clickable attacker-controlled href in the redirect body
complexity: simple
exploitable: true
reference_exploit: 'Call ctx.redirect(''javascript:alert(1)''); Koa renders a clickable javascript: link in the HTML fallback body'
reference_fix_commit: 399cb6b0dd2104224c0ef0ce8e92f84e4f7faf42
notes: CVE-2025-32379. Vulnerable tag 2.15.4, fixed in 2.16.0 by replacing the HTML anchor with plain escaped text.
