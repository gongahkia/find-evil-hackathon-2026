taint_source: Referrer header consumed by ctx.redirect('back')
taint_sink: Location header via this.set('Location', ...)
taint_path:
- A route calls ctx.redirect('back')
- _getBackReferrer() treats any referrer starting with '/' as a safe relative path (lib/response.js:246-248)
- A protocol-relative referrer like //evil.example/phish therefore bypasses the intended same-origin validation
- redirect('back') uses that value (lib/response.js:280-281)
- this.set('Location', encodeUrl(url)) emits an external redirect (lib/response.js:288)
complexity: simple
exploitable: true
reference_exploit: 'Send `Referrer: //evil.example/phish` to a route that calls ctx.redirect(''back'')'
reference_fix_commit: 7f58bdc05ae7e13e7b9125a098f33a18667c8c61
notes: CVE-2025-62595. This is the incomplete-fix bypass for CVE-2025-8129; 2.16.3 removes the startsWith("/") fast path.
