target-version = "py312"
line-length = 100
src = ["src"]

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "SIM",
    "S",
    "RUF",
]
ignore = [
    "S101",
    "S603",
    "S607",
]

[lint.per-file-ignores]
"tests/fixtures/**" = ["S"]

[lint.isort]
known-first-party = ["piranesi"]

[format]
quote-style = "double"
indent-style = "space"
